{% extends "base.html" %}
{% block content %}
<h2>Recent Reports</h2>
{% for report in reports[::-1] %}
<div class="card">
{{ report.timestamp }} | Trades: {{ report.performance.trades }} | Win Rate: {{ report.performance.winrate }} | Total PnL: {{ report.performance.total_pnl }}
</div>
{% endfor %}
{% endblock %}
