{% extends "base.html" %}
{% block content %}

<div class="card premium-hero">
    <h2>Dashboard</h2>
    <p class="muted-line">Quick snapshot of system + positions</p>
</div>

<div class="grid">

    {% for p in positions %}
    <div class="card teaser-card">

        <h3>{{ p.symbol }}</h3>
        <p>PnL: {{ p.pnl }}</p>

        <!-- BLURRED PREMIUM DATA -->
        <div class="blur-box">
            <p>Risk: {{ p.risk }}</p>
            <p>Target: {{ p.target }}</p>
            <p>Warnings: {{ p.warning }}</p>
        </div>

        <div class="health-bar">
            <div class="health-fill" style="width: {{ p.health_score }}%"></div>
        </div>

        <p>Status: {{ p.status }}</p>

        <a href="/positions" class="cta-btn premium-gold-btn">
            View Full Position
        </a>

    </div>
    {% endfor %}

</div>

{% endblock %}
