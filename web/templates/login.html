{% extends "base.html" %}
{% block content %}

<h2>Login</h2>

<div class="card">
    <p>Secure login is enabled. Passwords are verified through hashed authentication rather than direct plain-text matching.</p>
</div>

<div class="card">
    <form action="/login" method="post">
        <p>Username</p>
        <input type="text" name="username" required>

        <p>Password</p>
        <input type="password" name="password" required>

        <br><br>
        <button type="submit" class="cta-btn">Login</button>
    </form>
</div>

{% endblock %}
