{% extends "base.html" %}
{% block content %}

<h2>Create Account</h2>

<div class="card">
    <p>New accounts are created with secure password hashing and start on the Starter tier by default.</p>
</div>

{% if error %}
<div class="card" style="border:1px solid rgba(239,68,68,0.45);">
    <p><b>{{ error }}</b></p>
</div>
{% endif %}

<div class="card">
    <form action="/signup" method="post">
        <p>Username</p>
        <input type="text" name="username" required>

        <p>Password</p>
        <input type="password" name="password" required>

        <br><br>
        <button type="submit" class="cta-btn">Create Account</button>
    </form>
</div>

{% endblock %}
