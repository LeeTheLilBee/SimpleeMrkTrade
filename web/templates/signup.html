{% extends "base.html" %}
{% block content %}

<h2>Create Account</h2>

<div class="card">
    <form action="/signup" method="post">
        <p>Username</p>
        <input type="text" name="username">
        <p>Password</p>
        <input type="password" name="password">
        <br><br>
        <button class="btn btn-blue" type="submit">Sign Up</button>
    </form>
</div>

{% endblock %}
